name: 'Post to Mastodon'
description: 'Post content to Mastodon with support for text, images, link sharing, and scheduling'
author: 'Gerald Nguyen'
branding:
  icon: 'message-square'
  color: 'purple'

inputs:
  server:
    description: 'Mastodon server address (e.g. "mastodon.social" or "me.dm")'
    required: true
  access-token:
    description: 'Mastodon Access Token'
    required: true
  content:
    description: 'Content to post to Mastodon'
    required: true
  link:
    description: 'Link to attach/append to the post (optional)'
    required: false
  media-files:
    description: 'Comma-separated list of media files or URLs to attach (optional)'
    required: false
  scheduled-publish-time:
    description: 'Schedule post for future publication. Supports ISO 8601 (e.g., "2024-12-31T23:59:59Z") or offset format (e.g., "+1d", "+2h", "+30m")'
    required: false
  log-level:
    description: 'Logging level (DEBUG, INFO, WARNING, ERROR)'
    required: false
    default: 'INFO'
  content-json:
    description: 'JSON API URL and path for dynamic content templating (e.g. https://example.com/data.json | items[RANDOM])'
    required: false
  time-zone:
    description: 'Time zone for date/time placeholders (e.g. UTC, UTC+7)'
    required: false
  dry-run:
    description: 'Dry run mode. If true, the content will be printed but not posted.'
    required: false
    default: 'false'
  save-response:
    description: 'Save post response summary to mastodon-response.json (success, error, post_id, post_url).'
    required: false
    default: 'false'

outputs:
  post-id:
    description: 'ID of the created post'
  post-url:
    description: 'URL of the created post'

runs:
  using: 'composite'
  steps:
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      shell: bash
      run: |
        pip install -r ${{ github.action_path }}/requirements.txt
    
    - name: Post to Mastodon
      shell: bash
      env:
        MASTODON_SERVER: ${{ inputs.server }}
        MASTODON_ACCESS_TOKEN: ${{ inputs.access-token }}
        POST_CONTENT: ${{ inputs.content }}
        POST_LINK: ${{ inputs.link }}
        MEDIA_FILES: ${{ inputs.media-files }}
        SCHEDULED_PUBLISH_TIME: ${{ inputs.scheduled-publish-time }}
        LOG_LEVEL: ${{ inputs.log-level }}
        CONTENT_JSON: ${{ inputs.content-json }}
        TIME_ZONE: ${{ inputs.time-zone }}
        DRY_RUN: ${{ inputs.dry-run }}
        SAVE_RESPONSE: ${{ inputs.save-response }}
      run: |
        python ${{ github.action_path }}/post_to_mastodon.py
